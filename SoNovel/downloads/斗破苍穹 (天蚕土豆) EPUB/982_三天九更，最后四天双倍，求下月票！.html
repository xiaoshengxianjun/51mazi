  <h2>三天九更，最后四天双倍，求下月票！</h2>
  <div>
    <p>三天保持下来了，虽然不算太长，但对于经历过上个月那番惨烈战斗，至今未能有休息时间的土豆来说，已经是尽力了。</p><p>也不多说其他的了，双倍月票最后四天时间了，弟兄们，恳请大伙将手中宝贵的月票投给斗破，这四天时间，基本是会决定本月的排名，所以，很重要...</p><p>一些要将月票留在月底的弟兄，也拜请提前一下，毕竟现在一张能变两张不是？</p><p>呵呵，拜托大家了...</p><!--PAGE1-->
