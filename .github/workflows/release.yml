name: Build and Release

on:
  push:
    tags:
      - 'v*' # 当推送以 v 开头的 tag 时触发

jobs:
  release:
    permissions:
      contents: write
    timeout-minutes: 60
    strategy:
      fail-fast: false  # 一个平台失败不影响其他平台
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        continue-on-error: false

      - name: Build application
        run: npm run build

      - name: Build for macOS
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: true
        run: |
          echo "Building for macOS..."
          npm run build:mac
          echo "Build completed, checking output..."
          ls -la dist/ || echo "dist directory not found"

      - name: Build for Windows
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: true
        run: |
          echo "Building for Windows..."
          npm run build:win
          echo "Build completed, checking output..."
          dir dist || echo "dist directory not found"

      - name: Fix app-builder permissions (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "Fixing app-builder permissions..."
          chmod +x node_modules/app-builder-bin/linux/x64/app-builder 2>/dev/null || true
          chmod +x node_modules/app-builder-bin/linux/arm64/app-builder 2>/dev/null || true
          find node_modules/app-builder-bin -name "app-builder" -type f -exec chmod +x {} \; 2>/dev/null || true

      - name: Build for Linux
        if: matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: true
        continue-on-error: false
        run: |
          echo "Building for Linux..."
          npm run build:linux || {
            echo "Build failed, but checking if any artifacts were created..."
            ls -la dist/ || echo "No dist directory"
            exit 1
          }
          echo "Build completed, checking output..."
          ls -la dist/ || echo "dist directory not found"

      - name: List build artifacts (macOS/Linux)
        if: always() && (matrix.os == 'macos-latest' || matrix.os == 'ubuntu-latest')
        shell: bash
        run: |
          echo "Listing files in dist directory:"
          ls -la dist/ || echo "dist directory not found"
          find dist -type f 2>/dev/null | head -20 || echo "No files found"

      - name: List build artifacts (Windows)
        if: always() && matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          echo "Listing files in dist directory:"
          if (Test-Path dist) {
            Get-ChildItem -Recurse dist | Select-Object -First 20 FullName
          } else {
            echo "dist directory not found"
          }

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: dist/
          if-no-files-found: warn
          retention-days: 7

  release-all:
    needs: release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    if: always()  # 即使部分构建失败也创建 release
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List artifacts
        run: |
          echo "=== Artifacts Structure ==="
          find dist -type f 2>/dev/null | head -30 || echo "No artifacts found"
          echo ""
          echo "=== Build Artifacts ==="
          find dist -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.snap" -o -name "*.zip" \) 2>/dev/null | head -20 || echo "No build artifacts found"

      # 移除 electron-builder 的调试文件，避免上传到 Release 时触发 404
      - name: Remove debug files
        run: |
          find dist -type f -name 'builder-debug.yml' -delete 2>/dev/null || true

      # 各平台都产出 app-update.yml，重名上传会 422，只保留一份
      - name: Deduplicate app-update.yml
        run: |
          found=
          while IFS= read -r -d '' f; do
            if [ -z "$found" ]; then found=1; else rm -f "$f"; fi
          done < <(find dist -type f -name 'app-update.yml' -print0 2>/dev/null)

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Release ${{ github.ref_name }}
            
            ### 下载安装包
            
            - **Windows**: 下载 `.exe` 文件进行安装
            - **macOS**: 下载 `.dmg` 文件进行安装
            - **Linux**: 下载 `.AppImage`、`.deb` 或 `.snap` 文件
            
            ### 构建信息
            - 构建时间: ${{ github.event.head_commit.timestamp }}
            - 提交: ${{ github.sha }}
          files: |
            dist/**/*.exe
            dist/**/*.dmg
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.zip
            # ---- auto update metadata (electron-updater) ----
            # Windows: latest.yml + *.blockmap
            # macOS: latest-mac.yml + *.blockmap
            # Linux: latest-linux.yml + *.blockmap (AppImage/deb)
            dist/**/*.yml
            dist/**/*.yaml
            dist/**/*.blockmap
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -------------------- Sync to self-hosted updater (51mazi-api) --------------------
      # 将三平台构建产物汇总为一个 zip（根目录平铺），上传到 51mazi-api，并发布到 stable。
      # 需要在 GitHub Actions Secrets 配置：
      # - MAZI_API_BASE: https://api.51mazi.com
      # - MAZI_API_ADMIN_TOKEN: 你的 51mazi-api ADMIN_TOKEN
      - name: Bundle updater zip
        shell: bash
        run: |
          set -euo pipefail

          rm -rf bundle release.zip || true
          mkdir -p bundle

          echo "Collecting updater metadata..."
          find dist -type f \( -name "latest.yml" -o -name "latest-mac.yml" -o -name "latest-linux.yml" \) -print -exec cp -f {} bundle/ \;

          echo "Collecting installers / packages / blockmaps..."
          find dist -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.zip" -o -name "*.blockmap" \) \
            -print -exec cp -f {} bundle/ \;

          echo "Bundle directory:"
          ls -la bundle

          # 必须至少包含一个 latest*.yml，否则 51mazi-api 会拒绝上传
          if ! ls bundle/latest*.yml >/dev/null 2>&1; then
            echo "ERROR: No latest*.yml found in bundle/. electron-builder did not generate updater metadata."
            exit 1
          fi

          echo "Creating release.zip..."
          (cd bundle && zip -r ../release.zip .)
          ls -la release.zip

      - name: Upload to 51mazi-api and publish stable
        shell: bash
        env:
          MAZI_API_BASE: ${{ secrets.MAZI_API_BASE }}
          MAZI_API_ADMIN_TOKEN: ${{ secrets.MAZI_API_ADMIN_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ -z "${MAZI_API_BASE:-}" ] || [ -z "${MAZI_API_ADMIN_TOKEN:-}" ]; then
            echo "ERROR: Missing secrets. Please set MAZI_API_BASE and MAZI_API_ADMIN_TOKEN in GitHub Actions Secrets."
            exit 1
          fi

          echo "Uploading release.zip to ${MAZI_API_BASE}/api/releases/upload ..."
          curl -fS -X POST "${MAZI_API_BASE%/}/api/releases/upload" \
            -H "x-admin-token: ${MAZI_API_ADMIN_TOKEN}" \
            -F "archive=@release.zip" \
            -F "releaseNotes=Release ${RELEASE_TAG}"

          # 从 latest*.yml 中解析版本号（优先 latest.yml，其次 latest-mac.yml / latest-linux.yml）
          node -e "const fs=require('fs'); const path=require('path');\
            const candidates=['latest.yml','latest-mac.yml','latest-linux.yml'].map(f=>path.join('bundle',f));\
            const existing=candidates.find(p=>fs.existsSync(p));\
            if(!existing){console.error('No latest*.yml found');process.exit(1);}\
            const content=fs.readFileSync(existing,'utf8');\
            const m=content.match(/^version:\\s*([0-9]+\\.[0-9]+\\.[0-9]+)\\s*$/m);\
            if(!m){console.error('Failed to parse version from '+existing);process.exit(1);}\
            console.log(m[1]);" > .release_version

          VERSION="$(cat .release_version)"
          echo "Parsed version: ${VERSION}"

          echo "Publishing ${VERSION} to stable..."
          curl -fS -X POST "${MAZI_API_BASE%/}/api/releases/${VERSION}/publish" \
            -H "x-admin-token: ${MAZI_API_ADMIN_TOKEN}"
      # ------------------------------------------------------------------------------

